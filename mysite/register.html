<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0c0e; --surface: #13151a; --border: #222430;
      --accent: #c8f04e; --accent-dim: #a8cc3a;
      --text: #e8e9ed; --muted: #6b6f7e; --error: #ff5f6d;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(200,240,78,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(200,240,78,0.03) 1px, transparent 1px);
      background-size: 48px 48px; animation: gridDrift 20s linear infinite; pointer-events: none;
    }
    @keyframes gridDrift { from { transform: translate(0,0); } to { transform: translate(48px,48px); } }
    .glow {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(200,240,78,0.07) 0%, transparent 70%);
      bottom: -200px; right: -200px; pointer-events: none;
      animation: glowDrift 8s ease-in-out infinite alternate;
    }
    @keyframes glowDrift { from { transform: translate(0,0); } to { transform: translate(-150px,-200px); } }
    .card {
      position: relative; background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 52px 48px; width: 100%; max-width: 420px;
      animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .card::before {
      content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.6;
    }
    .label-top { font-size: 10px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 32px; font-weight: 400; line-height: 1.1; margin-bottom: 36px; }
    h1 em { font-style: italic; color: var(--accent); }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 2px;
      padding: 13px 16px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,240,78,0.08); }
    input::placeholder { color: var(--muted); }
    .msg { font-size: 11px; margin-top: 6px; min-height: 16px; display: none; }
    .msg.show { display: block; }
    .msg.error { color: var(--error); }
    .msg.success { color: var(--accent); }
    .strength-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s, background 0.3s; }
    button[type="submit"] {
      width: 100%; margin-top: 8px; background: var(--accent); color: #0b0c0e;
      border: none; border-radius: 2px; padding: 14px; font-family: 'DM Mono', monospace;
      font-size: 12px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    button[type="submit"]:hover { background: var(--accent-dim); }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .switch-link { margin-top: 28px; font-size: 11px; color: var(--muted); text-align: center; }
    .switch-link a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    .switch-link a:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="label-top">create account</div>
    <h1>Join &<br><em>get started</em></h1>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="choose a username" autocomplete="username" oninput="clearMsg()"/>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="min. 6 characters" autocomplete="new-password" oninput="checkStrength()"/>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    </div>

    <div class="field">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="repeat password" autocomplete="new-password" oninput="clearMsg()"/>
    </div>

    <div class="msg" id="msg"></div>

    <button type="submit" id="reg-btn" onclick="handleRegister()">
      <span id="btn-text">Create Account</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="switch-link">Already have an account? <a href="/">Sign in</a></div>
  </div>

  <script>
    function checkStrength() {
      const pw = document.getElementById('password').value;
      const fill = document.getElementById('strength-fill');
      let score = 0;
      if (pw.length >= 6) score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw) && /[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const colors = ['#ff5f6d','#ffa45c','#f0d44e','#c8f04e'];
      const widths = ['25%','50%','75%','100%'];
      fill.style.width = pw.length ? widths[score - 1] || '10%' : '0';
      fill.style.background = pw.length ? colors[score - 1] || '#ff5f6d' : 'transparent';
    }

    function clearMsg() {
      const m = document.getElementById('msg');
      m.className = 'msg'; m.textContent = '';
    }

    function showMsg(text, type) {
      const m = document.getElementById('msg');
      m.textContent = text; m.className = 'msg ' + type + ' show';
    }

    async function handleRegister() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('reg-btn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('spinner');

      clearMsg();

      if (!username) return showMsg('Username is required.', 'error');
      if (username.length < 3) return showMsg('Username must be at least 3 characters.', 'error');
      if (password.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
      if (password !== confirm) return showMsg('Passwords do not match.', 'error');

      btn.disabled = true; btnText.style.display = 'none'; spinner.style.display = 'block';

      try {
        const res = await fetch('/.netlify/functions/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          showMsg('Account created! Redirecting to login…', 'success');
          setTimeout(() => window.location.href = '/', 1800);
        } else {
          showMsg(data.error || 'Registration failed.', 'error');
        }
      } catch (e) {
        showMsg('Connection error. Please try again.', 'error');
      } finally {
        btn.disabled = false; btnText.style.display = 'block'; spinner.style.display = 'none';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
  </script>
</body>
</html>
