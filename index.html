<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111111;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #f0f0f0;
      --error: #f87171;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .course-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 40px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 32px;
      color: var(--text);
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 11px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #555; }
    input::placeholder { color: #444; }

    .error-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--error);
      margin-top: 8px;
      display: none;
    }
    .error-msg.show { display: block; }

    button[type="submit"] {
      width: 100%;
      margin-top: 10px;
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 13px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.03em;
    }
    button[type="submit"]:hover { opacity: 0.85; }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .created-by {
      margin-top: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="course-tag">IT 023-IT33S2 — Ethical Hacking and Penetration Testing</div>

  <div class="card">
    <h1>Sign in</h1>


    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="username" autocomplete="username"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="password" autocomplete="current-password"/>
      <div class="error-msg" id="error-msg">Invalid username or password.</div>
    </div>

    <button type="submit" id="login-btn" onclick="handleLogin()">
      <span id="btn-text">Sign in</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <div class="created-by">created by — Group 5</div>

  <script>
    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('spinner');
      const errorMsg = document.getElementById('error-msg');
      errorMsg.classList.remove('show');
      btn.disabled = true; btnText.style.display = 'none'; spinner.style.display = 'block';
      try {
        const res = await fetch('/.netlify/functions/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          sessionStorage.setItem('auth_token', data.token);
          sessionStorage.setItem('auth_user', username);
          window.location.href = '/home.html';
        } else {
          errorMsg.textContent = data.error || 'Invalid username or password.';
          errorMsg.classList.add('show');
        }
      } catch (e) {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.classList.add('show');
      } finally {
        btn.disabled = false; btnText.style.display = 'block'; spinner.style.display = 'none';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
